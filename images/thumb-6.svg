  @keyframes tw { 0%,100%{opacity:.3} 50%{opacity:1} }
  @keyframes wave { 0%,100%{transform:scaleY(.42)} 50%{transform:scaleY(1)} }
  @keyframes flo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @media (prefers-reduced-motion:reduce){ *{animation:none!important} .draw{stroke-dashoffset:0} }
